name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Node 24 = the toolchain that generates package-lock.json locally.
      # npm 10 (Node 20) resolves vitest's nested vite@8 optional-esbuild peer
      # differently and rejects the npm-11 lock ("Missing: esbuild@0.28.1").
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
