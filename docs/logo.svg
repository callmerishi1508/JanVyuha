<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 240" width="880" height="240" role="img" aria-label="JanVyuha — Citizen, Governance, Response">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2447"/>
      <stop offset="1" stop-color="#0c1226"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#26315f"/>
      <stop offset="1" stop-color="#161e3d"/>
    </linearGradient>
  </defs>

  <!-- Panel -->
  <rect x="0.5" y="0.5" width="879" height="239" rx="28" fill="url(#panel)" stroke="#2b3766" stroke-width="1"/>
  <!-- Tricolor accent -->
  <rect x="40" y="30" width="90" height="5" rx="2.5" fill="#ff7d10"/>
  <rect x="134" y="30" width="30" height="5" rx="2.5" fill="#ffffff" opacity="0.9"/>
  <rect x="168" y="30" width="30" height="5" rx="2.5" fill="#0f8a4f"/>

  <!-- Emblem -->
  <g transform="translate(52,64) scale(0.2578)">
    <rect width="512" height="512" rx="112" fill="url(#tile)" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
    <circle cx="256" cy="256" r="176" fill="none" stroke="#ff7d10" stroke-width="11" opacity="0.85"/>
    <g stroke="#ffffff" stroke-width="17.6" stroke-linecap="round">
      <line x1="256" y1="256" x2="256" y2="132"/>
      <line x1="256" y1="256" x2="363.4" y2="194"/>
      <line x1="256" y1="256" x2="363.4" y2="318"/>
      <line x1="256" y1="256" x2="256" y2="380"/>
      <line x1="256" y1="256" x2="148.6" y2="318"/>
      <line x1="256" y1="256" x2="148.6" y2="194"/>
    </g>
    <g fill="#ffffff">
      <circle cx="256" cy="132" r="22"/>
      <circle cx="363.4" cy="194" r="22"/>
      <circle cx="363.4" cy="318" r="22"/>
      <circle cx="256" cy="380" r="22"/>
      <circle cx="148.6" cy="318" r="22"/>
      <circle cx="148.6" cy="194" r="22"/>
    </g>
    <circle cx="256" cy="256" r="48" fill="#ffffff"/>
    <circle cx="256" cy="256" r="29" fill="#ff7d10"/>
  </g>

  <!-- Wordmark -->
  <g font-family="'Inter','Segoe UI',system-ui,-apple-system,sans-serif">
    <text x="232" y="128" font-size="72" font-weight="800" letter-spacing="-1.5">
      <tspan fill="#ffffff">Jan</tspan><tspan fill="#ff9838">Vyuha</tspan>
    </text>
    <text x="235" y="170" font-size="19" font-weight="600" letter-spacing="4.5" fill="#9fb2d9">CITIZEN · GOVERNANCE · RESPONSE</text>
  </g>
</svg>
